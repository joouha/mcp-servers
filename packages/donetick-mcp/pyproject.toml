[project]
name = "donetick-mcp"
version = "0.1.0"
description = "MCP server for managing household chores via the Donetick API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=3.2.0",
    "httpx>=0.28.0",
    "pydantic>=2.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-timeout>=2.3.0",
]

[project.scripts]
donetick-mcp = "donetick_mcp:main"
