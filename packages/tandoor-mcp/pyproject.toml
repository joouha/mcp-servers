[project]
name = "tandoor-mcp"
version = "0.1.0"
description = "An MCP server for managing meal plans via Tandoor Recipes."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.0",
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.scripts]
tandoor-mcp = "tandoor_mcp:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

